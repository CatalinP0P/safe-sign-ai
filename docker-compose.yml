services:
  # 1. Baza de date (Postgres cu suport pentru Vectori)
  db:
    image: ankane/pgvector:latest
    restart: always
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: knowledge_db
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. Backend (FastAPI)
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://admin_user:admin_password@db:5432/knowledge_db
      WATCHFILES_FORCE_COLORS: "true"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    volumes:
      - ./backend:/app

  # 3. Frontend (Next.js)
  frontend:
    build: ./frontend
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
